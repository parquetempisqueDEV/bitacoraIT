function getBadgeClass(estado) {
  if (estado === 'Pendiente') return 'badge-pendiente';
  if (estado === 'En curso') return 'badge-encurso';
  if (estado === 'Completado') return 'badge-completado';

}

function formatFecha(fechaStr) {
  if (!fechaStr) return '';
  const [y, m, d] = fechaStr.split('-');
  return `${d}/${m}/${y}`;
}

function formatFechaHora(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
}

function hoyISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isoADatetimeLocal(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function datetimeLocalAISO(dtLocal) {
  if (!dtLocal) return null;
  return new Date(dtLocal).toISOString();
}

function minutosHasta(isoStr) {
  if (!isoStr) return null;
  return Math.round((new Date(isoStr) - new Date()) / 60000);
}

function describirTiempo(isoStr) {
  const mins = minutosHasta(isoStr);
  if (mins === null) return '';
  const absMin = Math.abs(mins);
  const pasado = mins < 0;
  let texto;
  if (absMin < 1) texto = 'Ahora mismo';
  else if (absMin < 60) texto = `${absMin} min`;
  else if (absMin < 1440) {
    const h = Math.floor(absMin / 60); const m = absMin % 60;
    texto = m === 0 ? `${h}h` : `${h}h ${m}min`;
  } else {
    const d = Math.floor(absMin / 1440); const h = Math.floor((absMin % 1440) / 60);
    texto = h === 0 ? `${d} día${d !== 1 ? 's' : ''}` : `${d}d ${h}h`;
  }
  return pasado ? `Vencido hace ${texto}` : `En ${texto}`;
}

function categoriaRecordatorio(isoStr) {
  const mins = minutosHasta(isoStr);
  if (mins === null) return 'sin';
  if (mins < 0) return 'vencido';
  if (mins <= 1440) return 'proximo';
  return 'futuro';
}

function pickColor(id) {

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

function formatTamano(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function formatDuracion(segs) {
  const m = Math.floor(segs / 60);
  const s = segs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function tipoIcono(mimeOrName) {
  const s = (mimeOrName || '').toLowerCase();
  if (s.startsWith('image/') || /\.(jpg|jpeg|png|gif|webp|heic)$/i.test(s)) return '🖼️';
  if (s.startsWith('video/') || /\.(mp4|mov|webm|avi|mkv)$/i.test(s)) return '🎥';
  if (s.startsWith('audio/') || /\.(mp3|wav|webm|m4a|ogg)$/i.test(s)) return '🎵';
  if (s.includes('pdf') || /\.pdf$/i.test(s)) return '📄';
  if (/word|\.docx?$/i.test(s)) return '📝';
  if (/excel|sheet|\.xlsx?$/i.test(s) || /\.csv$/i.test(s)) return '📊';
  if (/zip|rar|7z|tar|gz/i.test(s)) return '🗜️';
  return '📎';
}

function esImagen(adj) {
  return (adj.tipo || '').startsWith('image/') || /\.(jpg|jpeg|png|gif|webp|heic)$/i.test(adj.nombre || '');
}

function esVideo(adj) {
  return (adj.tipo || '').startsWith('video/') || /\.(mp4|mov|webm|avi|mkv)$/i.test(adj.nombre || '');
}

function esAudio(adj) {
  return (adj.tipo || '').startsWith('audio/') || /\.(mp3|wav|webm|m4a|ogg)$/i.test(adj.nombre || '');
}

/* ==================== UPLOAD HELPER ==================== */

async function subirArchivo(file, carpeta, onProgress) {
  if (file.size > MAX_FILE_MB * 1024 * 1024) {
    throw new Error(`El archivo excede el límite de ${MAX_FILE_MB} MB`);
  }
  const timestamp = Date.now();
  const nombreLimpio = file.name.replace(/[^\w.\-]/g, '_');
  const path = `${carpeta}/${timestamp}_${nombreLimpio}`;

  // Simulamos progreso ya que Supabase JS v2 no expone progress en upload
  if (onProgress) onProgress(20);
  const { data, error } = await supabase.storage
    .from(STORAGE_BUCKET)
    .upload(path, file, { cacheControl: '3600', upsert: false });
  if (error) throw error;
  if (onProgress) onProgress(80);

  const { data: pub } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  if (onProgress) onProgress(100);

  return {
    nombre: file.name,
    url: pub.publicUrl,
    tipo: file.type || '',
    tamano: file.size,
    path
  };
}

async function eliminarArchivo(path) {
  if (!path) return;
  await supabase.storage.from(STORAGE_BUCKET).remove([path]);
}

/* Botón de dictado por voz */
function BotonMicrofono({ onTranscript, disabled }) {
  const [escuchando, setEscuchando] = useState(false);
  const [soportado, setSoportado] = useState(true);
  const recognitionRef = useRef(null);

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setSoportado(false); return; }
  }, []);

  function toggle() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;

    if (escuchando) {
      recognitionRef.current?.stop();
      return;
    }

    const rec = new SR();
    rec.lang = 'es-CR';
    rec.continuous = true;
    rec.interimResults = false;

    rec.onresult = (event) => {
      let texto = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) texto += event.results[i][0].transcript;
      }
      if (texto) onTranscript(texto);
    };
    rec.onerror = (e) => {
      console.error('Error dictado:', e.error);
      if (e.error === 'not-allowed') alert('Permiso de micrófono denegado');
      setEscuchando(false);
    };
    rec.onend = () => setEscuchando(false);

    recognitionRef.current = rec;
    rec.start();
    setEscuchando(true);
  }

  if (!soportado) return null;

  return (
    <button type="button" onClick={toggle} disabled={disabled}
      className={`mic-btn ${escuchando ? 'recording' : ''}`}
      title={escuchando ? 'Detener dictado' : 'Dictar texto'}>
      🎤
    </button>
  );
}

/* Grabador de audio (memo de voz) */
function GrabadorAudio({ onAudioListo, disabled }) {
  const [grabando, setGrabando] = useState(false);
  const [duracion, setDuracion] = useState(0);
  const [audioBlob, setAudioBlob] = useState(null);
  const [audioURL, setAudioURL] = useState('');
  const [soportado, setSoportado] = useState(true);
  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);

  useEffect(() => {
    if (!navigator.mediaDevices || !window.MediaRecorder) setSoportado(false);
  }, []);

  async function iniciar() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      chunksRef.current = [];
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        setAudioBlob(blob);
        setAudioURL(URL.createObjectURL(blob));
        stream.getTracks().forEach(t => t.stop());
      };
      mr.start();
      mediaRecorderRef.current = mr;
      setGrabando(true);
      setDuracion(0);
      timerRef.current = setInterval(() => setDuracion(d => d + 1), 1000);
    } catch (e) {
      alert('No se pudo acceder al micrófono: ' + e.message);
    }
  }

  function detener() {
    mediaRecorderRef.current?.stop();
    clearInterval(timerRef.current);
    setGrabando(false);
  }

  function adjuntar() {
    if (!audioBlob) return;
    const nombre = `memo-voz-${Date.now()}.webm`;
    const file = new File([audioBlob], nombre, { type: 'audio/webm' });
    onAudioListo(file);
    descartar();
  }

  function descartar() {
    if (audioURL) URL.revokeObjectURL(audioURL);
    setAudioBlob(null);
    setAudioURL('');
    setDuracion(0);
  }

  if (!soportado) return null;

  if (audioBlob) {
    return (
      <div className="bg-gray-50 border border-gray-200 rounded-lg p-3 space-y-2">
        <div className="text-xs font-semibold text-gray-600">Audio grabado · {formatDuracion(duracion)}</div>
        <audio controls src={audioURL} className="w-full h-10"></audio>
        <div className="flex gap-2">
          <button type="button" onClick={adjuntar}
            className="flex-1 pt-btn text-white text-sm font-semibold py-2 rounded-lg">Adjuntar</button>
          <button type="button" onClick={descartar}
            className="px-4 border border-gray-300 text-gray-700 text-sm font-semibold py-2 rounded-lg hover:bg-gray-50">Descartar</button>
        </div>
      </div>
    );
  }

  return (
    <button type="button" onClick={grabando ? detener : iniciar} disabled={disabled}
      className={`w-full flex items-center justify-center gap-2 py-2 rounded-lg text-sm font-semibold border ${grabando ? 'bg-red-50 text-red-700 border-red-300' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>
      {grabando ? (
        <>
          <span className="inline-block w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
          Detener · {formatDuracion(duracion)}
        </>
      ) : (
        <>🎙️ Grabar memo de voz</>
      )}
    </button>
  );
}

/* Gestor de adjuntos en el form */
function GestorAdjuntos({ adjuntos, setAdjuntos, carpeta }) {
  const [subiendo, setSubiendo] = useState({}); // {nombre: porcentaje}
  const fileInputRef = useRef(null);

  async function manejarArchivos(files) {
    for (const file of files) {
      const id = `${file.name}-${Date.now()}`;
      setSubiendo(s => ({ ...s, [id]: 0 }));
      try {
        const adj = await subirArchivo(file, carpeta, (p) => {
          setSubiendo(s => ({ ...s, [id]: p }));
        });
        setAdjuntos(prev => [...prev, adj]);
      } catch (e) {
        alert(`Error al subir "${file.name}": ${e.message}`);
      } finally {
        setSubiendo(s => {
          const c = { ...s }; delete c[id]; return c;
        });
      }
    }
  }

  async function quitar(idx) {
    const adj = adjuntos[idx];
    if (!confirm(`¿Quitar "${adj.nombre}"?`)) return;
    try {
      await eliminarArchivo(adj.path);
    } catch (e) { /* ignorar */ }
    setAdjuntos(prev => prev.filter((_, i) => i !== idx));
  }

  return (
    <div className="space-y-2">
      <input ref={fileInputRef} type="file" multiple
        onChange={e => { manejarArchivos(Array.from(e.target.files)); e.target.value = ''; }}
        style={{ display: 'none' }} />
      <button type="button" onClick={() => fileInputRef.current?.click()}
        className="w-full py-2 rounded-lg text-sm font-semibold bg-white text-gray-700 border border-gray-300 hover:bg-gray-50">
        📎 Adjuntar archivo
      </button>

      <GrabadorAudio onAudioListo={(file) => manejarArchivos([file])} />

      {Object.entries(subiendo).map(([id, pct]) => (
        <div key={id} className="bg-blue-50 border border-blue-200 rounded-lg p-2 text-xs">
          <div className="text-blue-800 mb-1">Subiendo… {pct}%</div>
          <div className="progress-bar"><div style={{ width: pct + '%' }}></div></div>
        </div>
      ))}

      {adjuntos.length > 0 && (
        <div className="space-y-2 mt-2">
          {adjuntos.map((adj, idx) => (
            <div key={idx} className="flex items-center justify-between bg-gray-50 border border-gray-200 rounded-lg p-2">
              <div className="flex items-center gap-2 min-w-0 flex-1">
                <span className="text-lg">{tipoIcono(adj.tipo || adj.nombre)}</span>
                <div className="min-w-0 flex-1">
                  <a href={adj.url} target="_blank" rel="noopener"
                    className="text-sm font-medium text-gray-800 hover:underline block truncate">
                    {adj.nombre}
                  </a>
                  <div className="text-xs text-gray-500">{formatTamano(adj.tamano)}</div>
                </div>
              </div>
              <button type="button" onClick={() => quitar(idx)}
                className="text-red-600 hover:text-red-800 text-sm font-semibold px-2">✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        <div className="grid grid-cols-3 gap-2">
          {imagenes.map((adj, i) => (
            <a key={i} href={adj.url} target="_blank" rel="noopener">
              <img src={adj.url} alt={adj.nombre}
                className="w-full h-20 object-cover rounded border border-gray-300 hover:opacity-80" />
            </a>
          ))}
        </div>
      )}
      {otros.map((adj, i) => (
        <div key={'o'+i}>
          {esAudio(adj) ? (
            <div className="bg-gray-50 border border-gray-200 rounded p-2">
              <div className="text-xs font-semibold text-gray-600 mb-1">🎵 {adj.nombre}</div>
              <audio controls src={adj.url} className="w-full h-8"></audio>

          ) : esVideo(adj) ? (
            <div className="bg-gray-50 border border-gray-200 rounded p-2">
              <div className="text-xs font-semibold text-gray-600 mb-1">🎥 {adj.nombre}</div>
              <video controls src={adj.url} className="w-full max-h-48 rounded"></video>

              className="adjunto-chip block w-full">
              <span>{tipoIcono(adj.tipo || adj.nombre)}</span>
              <span className="nombre flex-1">{adj.nombre}</span>
              <span className="text-gray-500 text-xs">{formatTamano(adj.tamano)}</span>
            </a>
          )}
        </div>
      ))}
    </div>
  );
}

function VistaBitacora() {
  const [entradas, setEntradas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [modalAbierto, setModalAbierto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [filtroEstado, setFiltroEstado] = useState('Todos');
  const [busqueda, setBusqueda] = useState('');
  const [verAdjuntos, setVerAdjuntos] = useState(null);

  async function cargar() {
    setLoading(true); setError('');
    const { data, error } = await supabase
      .from('bitacora_it').select('*')
      .order('fecha', { ascending: false })
      .order('created_at', { ascending: false });
    if (error) { setError('Error al cargar: ' + error.message); setEntradas([]); }
    else setEntradas(data || []);
    setLoading(false);
  }
  useEffect(() => { cargar(); }, []);

  async function guardar(datos, id) {
    if (editando) {
      const { error } = await supabase.from('bitacora_it').update(datos).eq('id', editando.id);
      if (error) return alert('Error al actualizar: ' + error.message);
    } else {
      const { error } = await supabase.from('bitacora_it').insert([{ id, ...datos }]);
      if (error) return alert('Error al guardar: ' + error.message);
    }
    setModalAbierto(false); setEditando(null); cargar();
  }

  async function eliminar(entrada) {
    if (!confirm('¿Eliminar esta entrada? Se borrarán también sus adjuntos.')) return;
    // Borrar adjuntos del storage
    if (entrada.adjuntos && entrada.adjuntos.length) {
      const paths = entrada.adjuntos.map(a => a.path).filter(Boolean);
      if (paths.length) await supabase.storage.from(STORAGE_BUCKET).remove(paths);
    }
    const { error } = await supabase.from('bitacora_it').delete().eq('id', entrada.id);
    if (error) return alert('Error: ' + error.message);
    cargar();
  }

  const entradasFiltradas = useMemo(() => entradas.filter(e => {
    if (filtroEstado !== 'Todos' && e.estado !== filtroEstado) return false;
    if (busqueda) {
      const q = busqueda.toLowerCase();
      if (!((e.titulo || '').toLowerCase().includes(q) || (e.descripcion || '').toLowerCase().includes(q))) return false;
    }
    return true;
  }), [entradas, filtroEstado, busqueda]);

  const stats = useMemo(() => ({
    total: entradas.length,
    pendiente: entradas.filter(e => e.estado === 'Pendiente').length,
    encurso: entradas.filter(e => e.estado === 'En curso').length,
    completado: entradas.filter(e => e.estado === 'Completado').length,
  }), [entradas]);

  function exportarCSV() {
    if (!entradasFiltradas.length) return alert('No hay entradas para exportar');
    const headers = ['Fecha', 'Título', 'Descripción', 'Estado', 'Adjuntos'];
    const rows = entradasFiltradas.map(e => [
      e.fecha,
      `"${(e.titulo || '').replace(/"/g, '""')}"`,
      `"${(e.descripcion || '').replace(/"/g, '""')}"`,
      e.estado,
      (e.adjuntos || []).length
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bitacora-it-${hoyISO()}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  function exportarPDF() {
    if (!entradasFiltradas.length) return alert('No hay entradas para exportar');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    doc.setFillColor(26, 74, 46);
    doc.rect(0, 0, pageWidth, 28, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
    doc.text('Bitácora IT — Parque Tempisque', 14, 13);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    doc.text('Encargado de Tecnologías de Información', 14, 20);
    doc.setTextColor(80, 80, 80); doc.setFontSize(9);
    const ahora = new Date();
    const fechaGen = ahora.toLocaleDateString('es-CR') + ' ' + ahora.toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
    doc.text(`Generado: ${fechaGen}`, 14, 36);
    const filtros = [];
    if (filtroEstado !== 'Todos') filtros.push(`Estado: ${filtroEstado}`);
    if (busqueda) filtros.push(`Búsqueda: "${busqueda}"`);
    if (filtros.length) doc.text(`Filtros: ${filtros.join(' · ')}`, 14, 41);
    doc.text(`Total de entradas: ${entradasFiltradas.length}`, 14, filtros.length ? 46 : 41);
    const startY = filtros.length ? 52 : 47;
    doc.autoTable({
      startY,
      head: [['Fecha', 'Título', 'Descripción', 'Estado', 'Adj.']],
      body: entradasFiltradas.map(e => [formatFecha(e.fecha), e.titulo || '', e.descripcion || '', e.estado, (e.adjuntos || []).length]),
      styles: { fontSize: 9, cellPadding: 2.5, valign: 'top' },
      headStyles: { fillColor: [26, 74, 46], textColor: 255, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 250, 249] },
      columnStyles: { 0: { cellWidth: 22 }, 1: { cellWidth: 42, fontStyle: 'bold' }, 2: { cellWidth: 'auto' }, 3: { cellWidth: 23 }, 4: { cellWidth: 12, halign: 'center' } },
      margin: { left: 14, right: 14 },
      didDrawPage: (data) => {
        const pageCount = doc.internal.getNumberOfPages();
        const pageHeight = doc.internal.pageSize.getHeight();
        doc.setFontSize(8); doc.setTextColor(150, 150, 150);
        doc.text(`Parque Tempisque · Bitácora IT · Página ${data.pageNumber} de ${pageCount}`, pageWidth / 2, pageHeight - 8, { align: 'center' });
      }
    });
    doc.save(`bitacora-it-${hoyISO()}.pdf`);
  }

  return (
    <div>
      <div className="flex justify-end mb-4">
        <button onClick={() => { setEditando(null); setModalAbierto(true); }}
          className="pt-btn text-white font-semibold px-5 py-2.5 rounded-lg shadow-sm">
          + Nueva entrada
        </button>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Total</div>
          <div className="text-3xl font-bold pt-text mt-1">{stats.total}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Pendiente</div>
          <div className="text-3xl font-bold text-amber-700 mt-1">{stats.pendiente}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">En curso</div>
          <div className="text-3xl font-bold text-blue-700 mt-1">{stats.encurso}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Completado</div>
          <div className="text-3xl font-bold text-emerald-700 mt-1">{stats.completado}</div>
        </div>
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4 flex flex-col md:flex-row gap-3 items-stretch md:items-center">
        <input type="text" value={busqueda} onChange={e => setBusqueda(e.target.value)}
          placeholder="Buscar por título o descripción…"
          className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" />
        <select value={filtroEstado} onChange={e => setFiltroEstado(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-green-700">
          <option value="Todos">Todos los estados</option>
          {ESTADOS.map(e => <option key={e} value={e}>{e}</option>)}
        </select>
        <button onClick={exportarCSV} className="border border-gray-300 text-gray-700 font-medium px-4 py-2 rounded-lg hover:bg-gray-50">
          Exportar CSV
        </button>
        <button onClick={exportarPDF} className="pt-btn text-white font-medium px-4 py-2 rounded-lg">
          Exportar PDF
        </button>
      </div>
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        {error && <div className="bg-red-50 border-b border-red-200 text-red-800 px-4 py-3 text-sm">{error}</div>}
        {loading ? <div className="p-12 text-center empty-state">Cargando…</div>
        : entradasFiltradas.length === 0 ? (
          <div className="p-12 text-center empty-state">
            {entradas.length === 0 ? 'Aún no hay entradas. Hacé clic en "Nueva entrada" para comenzar.' : 'No hay entradas que coincidan con los filtros.'}
          </div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="pt-bg-light border-b border-gray-200">
                <tr>
                  <th className="text-left px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider w-28">Fecha</th>
                  <th className="text-left px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider">Título / Descripción</th>
                  <th className="text-left px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider w-32">Estado</th>
                  <th className="text-right px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider w-40">Acciones</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {entradasFiltradas.map(e => (
                  <tr key={e.id}>
                    <td className="px-4 py-3 text-sm text-gray-700 font-medium align-top whitespace-nowrap">{formatFecha(e.fecha)}</td>
                    <td className="px-4 py-3 align-top">
                      <div className="font-semibold text-gray-900">{e.titulo}</div>
                      {e.descripcion && <div className="text-sm text-gray-600 mt-1 whitespace-pre-wrap">{e.descripcion}</div>}
                      {e.adjuntos && e.adjuntos.length > 0 && (
                        <button onClick={() => setVerAdjuntos(e)}
                          className="text-xs pt-text font-semibold mt-2 hover:underline">
                          📎 {e.adjuntos.length} adjunto{e.adjuntos.length !== 1 ? 's' : ''}
                        </button>
                      )}
                    </td>
                    <td className="px-4 py-3 align-top">
                      <span className={`inline-block px-2.5 py-1 rounded-full text-xs font-semibold ${getBadgeClass(e.estado)}`}>{e.estado}</span>
                    </td>
                    <td className="px-4 py-3 align-top text-right whitespace-nowrap">
                      <button onClick={() => { setEditando(e); setModalAbierto(true); }} className="text-sm pt-text font-semibold hover:underline mr-3">Editar</button>
                      <button onClick={() => eliminar(e)} className="text-sm text-red-600 font-semibold hover:underline">Eliminar</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      <Modal open={modalAbierto} onClose={() => { setModalAbierto(false); setEditando(null); }}
        title={editando ? 'Editar entrada' : 'Nueva entrada'}>
        <EntradaForm initial={editando} onSubmit={guardar}
          onCancel={() => { setModalAbierto(false); setEditando(null); }} />
      </Modal>
      <Modal open={!!verAdjuntos} onClose={() => setVerAdjuntos(null)}
        title={verAdjuntos ? `Adjuntos · ${verAdjuntos.titulo}` : ''}>
        {verAdjuntos && <VistaAdjuntos adjuntos={verAdjuntos.adjuntos || []} />}
      </Modal>
    </div>
  );
}

function BotonNotificaciones() {
  const [estado, setEstado] = useState('cargando');
  const [procesando, setProcesando] = useState(false);

  useEffect(() => { verificarEstado(); }, []);

  async function verificarEstado() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) { setEstado('no-soportado'); return; }
    if (Notification.permission === 'denied') { setEstado('denegado'); return; }
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (!reg) { setEstado('no-suscrito'); return; }
      const sub = await reg.pushManager.getSubscription();
      setEstado(sub ? 'suscrito' : 'no-suscrito');
    } catch (e) { setEstado('no-suscrito'); }
  }

  async function activar() {
    setProcesando(true);
    try {
      const reg = await navigator.serviceWorker.register('./sw.js');
      await navigator.serviceWorker.ready;
      const permiso = await Notification.requestPermission();
      if (permiso !== 'granted') {
        setEstado(permiso === 'denied' ? 'denegado' : 'no-suscrito');
        setProcesando(false); return;
      }
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
      const subJSON = sub.toJSON();
      const { error } = await supabase.from('push_subscriptions').upsert({
        id: Date.now(),
        endpoint: subJSON.endpoint,
        keys: subJSON.keys,
        user_agent: navigator.userAgent
      }, { onConflict: 'endpoint' });
      if (error) { alert('Error guardando suscripción: ' + error.message); setProcesando(false); return; }
      setEstado('suscrito');
      alert('¡Notificaciones activadas!');
    } catch (e) { alert('Error: ' + e.message); }
    setProcesando(false);
  }

  async function desactivar() {
    setProcesando(true);
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await supabase.from('push_subscriptions').delete().eq('endpoint', sub.endpoint);
          await sub.unsubscribe();
        }
      }
      setEstado('no-suscrito');
    } catch (e) { alert('Error: ' + e.message); }
    setProcesando(false);
  }

  if (estado === 'cargando') return null;
  if (estado === 'no-soportado') return <button disabled className="notif-btn-off font-medium px-4 py-2 rounded-lg opacity-50 text-sm">🔕 No soportado</button>;
  if (estado === 'denegado') return <button disabled className="notif-btn-off font-medium px-4 py-2 rounded-lg opacity-50 text-sm">🔕 Permisos bloqueados</button>;
  if (estado === 'suscrito') return <button onClick={desactivar} disabled={procesando} className="notif-btn-on font-medium px-4 py-2 rounded-lg text-sm">{procesando ? '...' : '🔔 Notificaciones activas'}</button>;
  return <button onClick={activar} disabled={procesando} className="notif-btn-off font-medium px-4 py-2 rounded-lg text-sm hover:bg-gray-50">{procesando ? 'Activando…' : '🔔 Activar notificaciones'}</button>;
}

function VistaNotas() {
  const [notas, setNotas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [modalAbierto, setModalAbierto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [busqueda, setBusqueda] = useState('');
  const [filtro, setFiltro] = useState('Todas');
  const [tick, setTick] = useState(0);

  async function cargar() {
    setLoading(true); setError('');
    const { data, error } = await supabase
      .from('notas_rapidas').select('*')
      .order('fecha', { ascending: false })
      .order('created_at', { ascending: false });
    if (error) { setError('Error al cargar: ' + error.message); setNotas([]); }
    else setNotas(data || []);
    setLoading(false);
  }
  useEffect(() => { cargar(); }, []);
  useEffect(() => { const i = setInterval(() => setTick(t => t + 1), 60000); return () => clearInterval(i); }, []);

  async function guardar(datos, id) {
    if (editando) {
      const { error } = await supabase.from('notas_rapidas').update(datos).eq('id', editando.id);
      if (error) return alert('Error al actualizar: ' + error.message);
    } else {
      const { error } = await supabase.from('notas_rapidas').insert([{ id, ...datos }]);
      if (error) return alert('Error al guardar: ' + error.message);
    }
    setModalAbierto(false); setEditando(null); cargar();
  }

  async function eliminar(nota) {
    if (!confirm('¿Eliminar esta nota? Se borrarán también sus adjuntos.')) return;
    if (nota.adjuntos && nota.adjuntos.length) {
      const paths = nota.adjuntos.map(a => a.path).filter(Boolean);
      if (paths.length) await supabase.storage.from(STORAGE_BUCKET).remove(paths);
    }
    const { error } = await supabase.from('notas_rapidas').delete().eq('id', nota.id);
    if (error) return alert('Error: ' + error.message);
    cargar();
  }

  const notasFiltradas = useMemo(() => notas.filter(n => {
    if (busqueda && !(n.nota || '').toLowerCase().includes(busqueda.toLowerCase())) return false;
    if (filtro === 'Con recordatorio' && !n.recordatorio) return false;
    if (filtro === 'Vencidas') { if (!n.recordatorio) return false; if (minutosHasta(n.recordatorio) >= 0) return false; }
    if (filtro === 'Próximas 24h') { if (!n.recordatorio) return false; const m = minutosHasta(n.recordatorio); if (m < 0 || m > 1440) return false; }
    if (filtro === 'Esta semana') { if (!n.recordatorio) return false; const m = minutosHasta(n.recordatorio); if (m < 0 || m > 10080) return false; }
    return true;
  }), [notas, busqueda, filtro, tick]);

  const stats = useMemo(() => {
    const conRec = notas.filter(n => n.recordatorio);
    return {
      total: notas.length,
      conRecordatorio: conRec.length,
      vencidas: conRec.filter(n => minutosHasta(n.recordatorio) < 0).length,
      proximas: conRec.filter(n => { const m = minutosHasta(n.recordatorio); return m >= 0 && m <= 1440; }).length,
    };
  }, [notas, tick]);

  return (
    <div>
      <div className="flex justify-end mb-4 gap-3 flex-wrap">
        <BotonNotificaciones />
        <button onClick={() => { setEditando(null); setModalAbierto(true); }}
          className="pt-btn text-white font-semibold px-5 py-2.5 rounded-lg shadow-sm">
          + Nueva nota
        </button>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Total notas</div>
          <div className="text-3xl font-bold pt-text mt-1">{stats.total}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Con recordatorio</div>
          <div className="text-3xl font-bold text-blue-700 mt-1">{stats.conRecordatorio}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Vencidas</div>
          <div className="text-3xl font-bold text-red-700 mt-1">{stats.vencidas}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Próximas 24h</div>
          <div className="text-3xl font-bold text-amber-700 mt-1">{stats.proximas}</div>
        </div>
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4 flex flex-col md:flex-row gap-3 items-stretch md:items-center">
        <input type="text" value={busqueda} onChange={e => setBusqueda(e.target.value)}
          placeholder="Buscar en notas…"
          className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" />
        <select value={filtro} onChange={e => setFiltro(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-green-700">
          <option value="Todas">Todas</option>
          <option value="Con recordatorio">Con recordatorio</option>
          <option value="Vencidas">Vencidas</option>
          <option value="Próximas 24h">Próximas 24h</option>
          <option value="Esta semana">Esta semana</option>
        </select>
      </div>
      {error && <div className="bg-red-50 border border-red-200 text-red-800 px-4 py-3 text-sm rounded-xl mb-4">{error}</div>}
      {loading ? <div className="bg-white rounded-xl p-12 text-center empty-state border border-gray-100">Cargando…</div>
      : notasFiltradas.length === 0 ? (
        <div className="bg-white rounded-xl p-12 text-center empty-state border border-gray-100">
          {notas.length === 0 ? 'Aún no hay notas. Hacé clic en "Nueva nota" para comenzar.' : 'No hay notas que coincidan con los filtros.'}
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          {notasFiltradas.map(n => (
            <PostItCard key={n.id} nota={n}
              onEdit={(nota) => { setEditando(nota); setModalAbierto(true); }}
              onDelete={eliminar} />
          ))}
        </div>
      )}
      <Modal open={modalAbierto} onClose={() => { setModalAbierto(false); setEditando(null); }}
        title={editando ? 'Editar nota' : 'Nueva nota'}>
        <NotaForm initial={editando} onSubmit={guardar}
          onCancel={() => { setModalAbierto(false); setEditando(null); }} />
      </Modal>
    </div>
  );
}

}
