function getBadgeClass(estado) {
  if (estado === 'Pendiente') return 'badge-pendiente';
  if (estado === 'En curso') return 'badge-encurso';
  if (estado === 'Completado') return 'badge-completado';

}

function formatFecha(fechaStr) {
  if (!fechaStr) return '';
  const [y, m, d] = fechaStr.split('-');
  return `${d}/${m}/${y}`;
}

function formatFechaHora(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
}

function hoyISO() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

// Convierte un ISO timestamptz a formato datetime-local (YYYY-MM-DDTHH:mm) en hora local
function isoADatetimeLocal(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
}

// Convierte un datetime-local (YYYY-MM-DDTHH:mm) a ISO con zona local
function datetimeLocalAISO(dtLocal) {
  if (!dtLocal) return null;
  // new Date interpreta el string sin Z como hora local
  return new Date(dtLocal).toISOString();
}

// Diferencia en minutos entre el recordatorio y ahora
function minutosHasta(isoStr) {
  if (!isoStr) return null;
  const objetivo = new Date(isoStr);
  const ahora = new Date();
  return Math.round((objetivo - ahora) / 60000);
}

// Texto descriptivo del tiempo faltante o pasado
function describirTiempo(isoStr) {
  const mins = minutosHasta(isoStr);
  if (mins === null) return '';
  const absMin = Math.abs(mins);
  const pasado = mins < 0;

  let texto;
  if (absMin < 1) texto = 'Ahora mismo';
  else if (absMin < 60) texto = `${absMin} min`;
  else if (absMin < 1440) {
    const h = Math.floor(absMin / 60);
    const m = absMin % 60;
    texto = m === 0 ? `${h}h` : `${h}h ${m}min`;
  } else {
    const d = Math.floor(absMin / 1440);
    const h = Math.floor((absMin % 1440) / 60);
    texto = h === 0 ? `${d} día${d !== 1 ? 's' : ''}` : `${d}d ${h}h`;
  }
  return pasado ? `Vencido hace ${texto}` : `En ${texto}`;
}

// Categoría visual del recordatorio
function categoriaRecordatorio(isoStr) {
  const mins = minutosHasta(isoStr);
  if (mins === null) return 'sin';
  if (mins < 0) return 'vencido';
  if (mins <= 1440) return 'proximo'; // ≤ 24h
  return 'futuro';
}

function pickColor(id) {
  return POSTIT_COLORS[Math.abs(Number(id)) % POSTIT_COLORS.length];
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

}

  const [saving, setSaving] = useState(false);

  async function handleSubmit() {
    if (!titulo.trim()) return alert('El título es obligatorio');
    if (!fecha) return alert('La fecha es obligatoria');
    setSaving(true);
    await onSubmit({ fecha, titulo: titulo.trim(), descripcion: descripcion.trim(), estado });
    setSaving(false);
  }

  return (
    <div className="space-y-4">
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-1">Fecha</label>

      </div>
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-1">Título</label>

      </div>

function VistaBitacora() {
  const [entradas, setEntradas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [modalAbierto, setModalAbierto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [filtroEstado, setFiltroEstado] = useState('Todos');
  const [busqueda, setBusqueda] = useState('');

  async function cargar() {
    setLoading(true); setError('');
    const { data, error } = await supabase
      .from('bitacora_it').select('*')
      .order('fecha', { ascending: false })
      .order('created_at', { ascending: false });
    if (error) { setError('Error al cargar: ' + error.message); setEntradas([]); }
    else setEntradas(data || []);
    setLoading(false);
  }
  useEffect(() => { cargar(); }, []);

  async function guardar(datos) {
    if (editando) {
      const { error } = await supabase.from('bitacora_it').update(datos).eq('id', editando.id);
      if (error) return alert('Error al actualizar: ' + error.message);
    } else {
      const { error } = await supabase.from('bitacora_it').insert([{ id: Date.now(), ...datos }]);
      if (error) return alert('Error al guardar: ' + error.message);
    }
    setModalAbierto(false); setEditando(null); cargar();
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar esta entrada?')) return;
    const { error } = await supabase.from('bitacora_it').delete().eq('id', id);
    if (error) return alert('Error: ' + error.message);
    cargar();
  }

  const entradasFiltradas = useMemo(() => entradas.filter(e => {
    if (filtroEstado !== 'Todos' && e.estado !== filtroEstado) return false;
    if (busqueda) {
      const q = busqueda.toLowerCase();
      if (!((e.titulo || '').toLowerCase().includes(q) || (e.descripcion || '').toLowerCase().includes(q))) return false;
    }
    return true;
  }), [entradas, filtroEstado, busqueda]);

  const stats = useMemo(() => ({
    total: entradas.length,
    pendiente: entradas.filter(e => e.estado === 'Pendiente').length,
    encurso: entradas.filter(e => e.estado === 'En curso').length,
    completado: entradas.filter(e => e.estado === 'Completado').length,
  }), [entradas]);

  function exportarCSV() {
    if (!entradasFiltradas.length) return alert('No hay entradas para exportar');
    const headers = ['Fecha', 'Título', 'Descripción', 'Estado'];
    const rows = entradasFiltradas.map(e => [
      e.fecha,
      `"${(e.titulo || '').replace(/"/g, '""')}"`,
      `"${(e.descripcion || '').replace(/"/g, '""')}"`,
      e.estado
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `bitacora-it-${hoyISO()}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  function exportarPDF() {
    if (!entradasFiltradas.length) return alert('No hay entradas para exportar');
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = doc.internal.pageSize.getWidth();
    doc.setFillColor(26, 74, 46);
    doc.rect(0, 0, pageWidth, 28, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
    doc.text('Bitácora IT — Parque Tempisque', 14, 13);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    doc.text('Encargado de Tecnologías de Información', 14, 20);
    doc.setTextColor(80, 80, 80); doc.setFontSize(9);
    const ahora = new Date();
    const fechaGen = ahora.toLocaleDateString('es-CR') + ' ' + ahora.toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
    doc.text(`Generado: ${fechaGen}`, 14, 36);
    const filtros = [];
    if (filtroEstado !== 'Todos') filtros.push(`Estado: ${filtroEstado}`);
    if (busqueda) filtros.push(`Búsqueda: "${busqueda}"`);
    if (filtros.length) doc.text(`Filtros: ${filtros.join(' · ')}`, 14, 41);
    doc.text(`Total de entradas: ${entradasFiltradas.length}`, 14, filtros.length ? 46 : 41);
    const startY = filtros.length ? 52 : 47;
    doc.autoTable({
      startY,
      head: [['Fecha', 'Título', 'Descripción', 'Estado']],
      body: entradasFiltradas.map(e => [formatFecha(e.fecha), e.titulo || '', e.descripcion || '', e.estado]),
      styles: { fontSize: 9, cellPadding: 2.5, valign: 'top' },
      headStyles: { fillColor: [26, 74, 46], textColor: 255, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 250, 249] },
      columnStyles: { 0: { cellWidth: 22 }, 1: { cellWidth: 45, fontStyle: 'bold' }, 2: { cellWidth: 'auto' }, 3: { cellWidth: 25 } },
      margin: { left: 14, right: 14 },
      didDrawPage: (data) => {
        const pageCount = doc.internal.getNumberOfPages();
        const pageHeight = doc.internal.pageSize.getHeight();
        doc.setFontSize(8); doc.setTextColor(150, 150, 150);
        doc.text(`Parque Tempisque · Bitácora IT · Página ${data.pageNumber} de ${pageCount}`, pageWidth / 2, pageHeight - 8, { align: 'center' });
      }
    });
    doc.save(`bitacora-it-${hoyISO()}.pdf`);
  }

  return (
    <div>
      <div className="flex justify-end mb-4">
        <button onClick={() => { setEditando(null); setModalAbierto(true); }}
          className="pt-btn text-white font-semibold px-5 py-2.5 rounded-lg shadow-sm">
          + Nueva entrada
        </button>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Total</div>
          <div className="text-3xl font-bold pt-text mt-1">{stats.total}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Pendiente</div>
          <div className="text-3xl font-bold text-amber-700 mt-1">{stats.pendiente}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">En curso</div>
          <div className="text-3xl font-bold text-blue-700 mt-1">{stats.encurso}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Completado</div>
          <div className="text-3xl font-bold text-emerald-700 mt-1">{stats.completado}</div>
        </div>
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4 flex flex-col md:flex-row gap-3 items-stretch md:items-center">
        <input type="text" value={busqueda} onChange={e => setBusqueda(e.target.value)}
          placeholder="Buscar por título o descripción…"
          className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" />
        <select value={filtroEstado} onChange={e => setFiltroEstado(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-green-700">
          <option value="Todos">Todos los estados</option>
          {ESTADOS.map(e => <option key={e} value={e}>{e}</option>)}
        </select>
        <button onClick={exportarCSV} className="border border-gray-300 text-gray-700 font-medium px-4 py-2 rounded-lg hover:bg-gray-50">
          Exportar CSV
        </button>
        <button onClick={exportarPDF} className="pt-btn text-white font-medium px-4 py-2 rounded-lg">
          Exportar PDF
        </button>
      </div>
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        {error && <div className="bg-red-50 border-b border-red-200 text-red-800 px-4 py-3 text-sm">{error}</div>}
        {loading ? <div className="p-12 text-center empty-state">Cargando…</div>
        : entradasFiltradas.length === 0 ? (
          <div className="p-12 text-center empty-state">
            {entradas.length === 0 ? 'Aún no hay entradas. Hacé clic en "Nueva entrada" para comenzar.' : 'No hay entradas que coincidan con los filtros.'}
          </div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="pt-bg-light border-b border-gray-200">
                <tr>
                  <th className="text-left px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider w-28">Fecha</th>
                  <th className="text-left px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider">Título / Descripción</th>
                  <th className="text-left px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider w-32">Estado</th>
                  <th className="text-right px-4 py-3 text-xs font-bold pt-text uppercase tracking-wider w-32">Acciones</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {entradasFiltradas.map(e => (
                  <tr key={e.id}>
                    <td className="px-4 py-3 text-sm text-gray-700 font-medium align-top whitespace-nowrap">{formatFecha(e.fecha)}</td>
                    <td className="px-4 py-3 align-top">
                      <div className="font-semibold text-gray-900">{e.titulo}</div>
                      {e.descripcion && <div className="text-sm text-gray-600 mt-1 whitespace-pre-wrap">{e.descripcion}</div>}
                    </td>
                    <td className="px-4 py-3 align-top">
                      <span className={`inline-block px-2.5 py-1 rounded-full text-xs font-semibold ${getBadgeClass(e.estado)}`}>{e.estado}</span>
                    </td>
                    <td className="px-4 py-3 align-top text-right whitespace-nowrap">
                      <button onClick={() => { setEditando(e); setModalAbierto(true); }} className="text-sm pt-text font-semibold hover:underline mr-3">Editar</button>
                      <button onClick={() => eliminar(e.id)} className="text-sm text-red-600 font-semibold hover:underline">Eliminar</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      <Modal open={modalAbierto} onClose={() => { setModalAbierto(false); setEditando(null); }}
        title={editando ? 'Editar entrada' : 'Nueva entrada'}>
        <EntradaForm initial={editando} onSubmit={guardar}
          onCancel={() => { setModalAbierto(false); setEditando(null); }} />
      </Modal>
    </div>
  );
}

/* ===================== NOTAS RÁPIDAS ===================== */

function NotaForm({ initial, onSubmit, onCancel }) {
  const [fecha, setFecha] = useState(initial?.fecha || hoyISO());
  const [nota, setNota] = useState(initial?.nota || '');
  const [recordatorio, setRecordatorio] = useState(initial?.recordatorio ? isoADatetimeLocal(initial.recordatorio) : '');
  const [saving, setSaving] = useState(false);

  async function handleSubmit() {
    if (!nota.trim()) return alert('La nota no puede estar vacía');
    if (!fecha) return alert('La fecha es obligatoria');
    setSaving(true);
    const recordatorioISO = recordatorio ? datetimeLocalAISO(recordatorio) : null;
    await onSubmit({
      fecha,
      nota: nota.trim(),
      recordatorio: recordatorioISO,
      // Si se cambia el recordatorio, reseteamos las flags de notificación
      ...(recordatorioISO !== initial?.recordatorio ? { notificado_push: false, notificado_email: false } : {})
    });
    setSaving(false);
  }

  return (
    <div className="space-y-4">
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-1">Fecha de la nota</label>
        <input type="date" value={fecha} onChange={e => setFecha(e.target.value)}
          className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" />
      </div>
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-1">Nota</label>
        <textarea value={nota} onChange={e => setNota(e.target.value)} rows="5"
          placeholder="Escribí la nota rápida…"
          className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700 resize-none" />
      </div>
      <div>
        <label className="block text-sm font-semibold text-gray-700 mb-1">
          Recordatorio <span className="text-gray-400 font-normal">(fecha y hora — opcional)</span>
        </label>
        <div className="flex gap-2">
          <input type="datetime-local" value={recordatorio} onChange={e => setRecordatorio(e.target.value)}
            className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" />
          {recordatorio && (
            <button onClick={() => setRecordatorio('')} type="button"
              className="px-3 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50 text-sm">
              Quitar
            </button>
          )}
        </div>
        {recordatorio && (
          <p className="text-xs text-gray-500 mt-1">
            Te notificaremos por push y por email a las {recordatorio.split('T')[1] || '--:--'} del {recordatorio.split('T')[0] || ''}.
          </p>
        )}
      </div>
      <div className="flex gap-3 pt-2">
        <button onClick={handleSubmit} disabled={saving}
          className="flex-1 pt-btn text-white font-semibold py-2.5 rounded-lg disabled:opacity-50">
          {saving ? 'Guardando…' : 'Guardar'}
        </button>
        <button onClick={onCancel} disabled={saving}
          className="px-6 border border-gray-300 text-gray-700 font-semibold py-2.5 rounded-lg hover:bg-gray-50">
          Cancelar
        </button>
      </div>
    </div>
  );
}

function PostItCard({ nota, onEdit, onDelete }) {
  const cat = categoriaRecordatorio(nota.recordatorio);
  let recordatorioClase = '';
  let recordatorioColor = 'text-gray-600';

  if (cat === 'vencido') {
    recordatorioClase = 'recordatorio-vencido';
    recordatorioColor = 'text-red-700';
  } else if (cat === 'proximo') {
    recordatorioClase = 'recordatorio-proximo';
    recordatorioColor = 'text-amber-700';
  }

  const colorBase = recordatorioClase || pickColor(nota.id);
  const textoTiempo = nota.recordatorio ? describirTiempo(nota.recordatorio) : '';

  return (
    <div className={`postit ${colorBase}`}>
      <div className="flex justify-between items-start mb-2">
        <div className="text-xs font-semibold text-gray-600">{formatFecha(nota.fecha)}</div>
        <div className="flex gap-2">
          <button onClick={() => onEdit(nota)} title="Editar"
            className="text-gray-500 hover:text-gray-800 text-sm">✎</button>
          <button onClick={() => onDelete(nota.id)} title="Eliminar"
            className="text-gray-500 hover:text-red-600 text-sm">✕</button>
        </div>
      </div>
      <div className="flex-1 text-gray-800 text-sm whitespace-pre-wrap break-words">{nota.nota}</div>
      {nota.recordatorio && (
        <div className="mt-3 pt-2 border-t border-black/10">
          <div className="flex items-start gap-1.5">
            <span className="text-xs mt-0.5">⏰</span>
            <div className="text-xs leading-tight">
              <div className="font-semibold text-gray-700">{formatFechaHora(nota.recordatorio)}</div>
              <div className={`font-semibold ${recordatorioColor} mt-0.5`}>{textoTiempo}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BotonNotificaciones() {
  const [estado, setEstado] = useState('cargando'); // cargando, no-soportado, denegado, no-suscrito, suscrito
  const [procesando, setProcesando] = useState(false);

  useEffect(() => {
    verificarEstado();
  }, []);

  async function verificarEstado() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      setEstado('no-soportado');
      return;
    }
    if (Notification.permission === 'denied') {
      setEstado('denegado');
      return;
    }
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (!reg) {
        setEstado('no-suscrito');
        return;
      }
      const sub = await reg.pushManager.getSubscription();
      setEstado(sub ? 'suscrito' : 'no-suscrito');
    } catch (e) {
      setEstado('no-suscrito');
    }
  }

  async function activar() {
    setProcesando(true);
    try {
      // Registrar service worker
      const reg = await navigator.serviceWorker.register('./sw.js');
      await navigator.serviceWorker.ready;

      // Pedir permiso
      const permiso = await Notification.requestPermission();
      if (permiso !== 'granted') {
        setEstado(permiso === 'denied' ? 'denegado' : 'no-suscrito');
        setProcesando(false);
        return;
      }

      // Crear suscripción
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });

      // Guardar en Supabase
      const subJSON = sub.toJSON();
      const { error } = await supabase.from('push_subscriptions').upsert({
        id: Date.now(),
        endpoint: subJSON.endpoint,
        keys: subJSON.keys,
        user_agent: navigator.userAgent
      }, { onConflict: 'endpoint' });

      if (error) {
        alert('Error guardando suscripción: ' + error.message);
        setProcesando(false);
        return;
      }

      setEstado('suscrito');
      alert('¡Notificaciones activadas! Te avisaremos cuando se cumpla un recordatorio.');
    } catch (e) {
      alert('Error: ' + e.message);
    }
    setProcesando(false);
  }

  async function desactivar() {
    setProcesando(true);
    try {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await supabase.from('push_subscriptions').delete().eq('endpoint', sub.endpoint);
          await sub.unsubscribe();
        }
      }
      setEstado('no-suscrito');
    } catch (e) {
      alert('Error: ' + e.message);
    }
    setProcesando(false);
  }

  if (estado === 'cargando') return null;

  if (estado === 'no-soportado') {
    return (
      <button disabled className="notif-btn-off font-medium px-4 py-2 rounded-lg opacity-50 text-sm">
        🔕 Notificaciones no soportadas
      </button>
    );
  }

  if (estado === 'denegado') {
    return (
      <button disabled className="notif-btn-off font-medium px-4 py-2 rounded-lg opacity-50 text-sm" title="Habilítalo desde la configuración del navegador">
        🔕 Permisos bloqueados
      </button>
    );
  }

  if (estado === 'suscrito') {
    return (
      <button onClick={desactivar} disabled={procesando}
        className="notif-btn-on font-medium px-4 py-2 rounded-lg text-sm">
        {procesando ? '...' : '🔔 Notificaciones activas'}
      </button>
    );
  }

  return (
    <button onClick={activar} disabled={procesando}
      className="notif-btn-off font-medium px-4 py-2 rounded-lg text-sm hover:bg-gray-50">
      {procesando ? 'Activando…' : '🔔 Activar notificaciones'}
    </button>
  );
}

function VistaNotas() {
  const [notas, setNotas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [modalAbierto, setModalAbierto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [busqueda, setBusqueda] = useState('');
  const [filtro, setFiltro] = useState('Todas');
  const [tick, setTick] = useState(0); // para refrescar cálculos de tiempo

  async function cargar() {
    setLoading(true); setError('');
    const { data, error } = await supabase
      .from('notas_rapidas').select('*')
      .order('fecha', { ascending: false })
      .order('created_at', { ascending: false });
    if (error) { setError('Error al cargar: ' + error.message); setNotas([]); }
    else setNotas(data || []);
    setLoading(false);
  }
  useEffect(() => { cargar(); }, []);

  // Refresca cada minuto para que los textos "En 5 min" se actualicen
  useEffect(() => {
    const interval = setInterval(() => setTick(t => t + 1), 60000);
    return () => clearInterval(interval);
  }, []);

  async function guardar(datos) {
    if (editando) {
      const { error } = await supabase.from('notas_rapidas').update(datos).eq('id', editando.id);
      if (error) return alert('Error al actualizar: ' + error.message);
    } else {
      const { error } = await supabase.from('notas_rapidas').insert([{ id: Date.now(), ...datos }]);
      if (error) return alert('Error al guardar: ' + error.message);
    }
    setModalAbierto(false); setEditando(null); cargar();
  }

  async function eliminar(id) {
    if (!confirm('¿Eliminar esta nota?')) return;
    const { error } = await supabase.from('notas_rapidas').delete().eq('id', id);
    if (error) return alert('Error: ' + error.message);
    cargar();
  }

  const notasFiltradas = useMemo(() => notas.filter(n => {
    if (busqueda && !(n.nota || '').toLowerCase().includes(busqueda.toLowerCase())) return false;
    if (filtro === 'Con recordatorio' && !n.recordatorio) return false;
    if (filtro === 'Vencidas') {
      if (!n.recordatorio) return false;
      if (minutosHasta(n.recordatorio) >= 0) return false;
    }
    if (filtro === 'Próximas 24h') {
      if (!n.recordatorio) return false;
      const m = minutosHasta(n.recordatorio);
      if (m < 0 || m > 1440) return false;
    }
    if (filtro === 'Esta semana') {
      if (!n.recordatorio) return false;
      const m = minutosHasta(n.recordatorio);
      if (m < 0 || m > 10080) return false;
    }
    return true;
  }), [notas, busqueda, filtro, tick]);

  const stats = useMemo(() => {
    const conRec = notas.filter(n => n.recordatorio);
    return {
      total: notas.length,
      conRecordatorio: conRec.length,
      vencidas: conRec.filter(n => minutosHasta(n.recordatorio) < 0).length,
      proximas: conRec.filter(n => { const m = minutosHasta(n.recordatorio); return m >= 0 && m <= 1440; }).length,
    };
  }, [notas, tick]);

  return (
    <div>
      <div className="flex justify-end mb-4 gap-3 flex-wrap">
        <BotonNotificaciones />
        <button onClick={() => { setEditando(null); setModalAbierto(true); }}
          className="pt-btn text-white font-semibold px-5 py-2.5 rounded-lg shadow-sm">
          + Nueva nota
        </button>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Total notas</div>
          <div className="text-3xl font-bold pt-text mt-1">{stats.total}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Con recordatorio</div>
          <div className="text-3xl font-bold text-blue-700 mt-1">{stats.conRecordatorio}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Vencidas</div>
          <div className="text-3xl font-bold text-red-700 mt-1">{stats.vencidas}</div>
        </div>
        <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <div className="text-sm text-gray-500 font-medium">Próximas 24h</div>
          <div className="text-3xl font-bold text-amber-700 mt-1">{stats.proximas}</div>
        </div>
      </div>

      <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 mb-4 flex flex-col md:flex-row gap-3 items-stretch md:items-center">
        <input type="text" value={busqueda} onChange={e => setBusqueda(e.target.value)}
          placeholder="Buscar en notas…"
          className="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" />
        <select value={filtro} onChange={e => setFiltro(e.target.value)}
          className="border border-gray-300 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-green-700">
          <option value="Todas">Todas</option>
          <option value="Con recordatorio">Con recordatorio</option>
          <option value="Vencidas">Vencidas</option>
          <option value="Próximas 24h">Próximas 24h</option>
          <option value="Esta semana">Esta semana</option>
        </select>
      </div>

      {error && <div className="bg-red-50 border border-red-200 text-red-800 px-4 py-3 text-sm rounded-xl mb-4">{error}</div>}
      {loading ? (
        <div className="bg-white rounded-xl p-12 text-center empty-state border border-gray-100">Cargando…</div>
      ) : notasFiltradas.length === 0 ? (
        <div className="bg-white rounded-xl p-12 text-center empty-state border border-gray-100">
          {notas.length === 0 ? 'Aún no hay notas. Hacé clic en "Nueva nota" para comenzar.' : 'No hay notas que coincidan con los filtros.'}
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          {notasFiltradas.map(n => (
            <PostItCard key={n.id} nota={n}
              onEdit={(nota) => { setEditando(nota); setModalAbierto(true); }}
              onDelete={eliminar} />
          ))}
        </div>
      )}

      <Modal open={modalAbierto} onClose={() => { setModalAbierto(false); setEditando(null); }}
        title={editando ? 'Editar nota' : 'Nueva nota'}>
        <NotaForm initial={editando} onSubmit={guardar}
          onCancel={() => { setModalAbierto(false); setEditando(null); }} />
      </Modal>
    </div>
  );
}
